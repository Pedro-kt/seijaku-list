fragment MediaFields on Media {
  id
  idMal
  title {
    romaji
    english
    native
    userPreferred
  }
  coverImage {
    large
    extraLarge
    medium
    color
  }
  bannerImage
  format
  type
  status
  description(asHtml: false)
  startDate {
    year
    month
    day
  }
  endDate {
    year
    month
    day
  }
  season
  seasonYear
  seasonInt
  episodes
  chapters
  volumes
  duration
  countryOfOrigin
  isLicensed
  source
  hashtag
  updatedAt
  averageScore
  meanScore
  popularity
  trending
  favourites
  genres
  synonyms
  isAdult
  isFavourite
  isLocked

  # Studios - traer todos (main y non-main)
  studios {
    edges {
      isMain
      node {
        id
        name
        isAnimationStudio
        siteUrl
        isFavourite
      }
    }
  }

  # Tags - información completa
  tags {
    id
    name
    description
    category
    rank
    isGeneralSpoiler
    isMediaSpoiler
    isAdult
  }

  # Trailer
  trailer {
    id
    site
    thumbnail
  }

  # Next airing episode
  nextAiringEpisode {
    id
    airingAt
    timeUntilAiring
    episode
    mediaId
  }

  # Rankings
  rankings {
    id
    rank
    type
    format
    year
    season
    allTime
    context
  }

  # Media stats
  stats {
    scoreDistribution {
      score
      amount
    }
    statusDistribution {
      status
      amount
    }
  }
}
