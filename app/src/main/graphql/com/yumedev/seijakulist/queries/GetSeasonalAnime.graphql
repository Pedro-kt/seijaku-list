query GetSeasonalAnime(
  $season: MediaSeason!,
  $seasonYear: Int!,
  $page: Int = 1,
  $perPage: Int = 20
) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      total
      currentPage
      lastPage
      hasNextPage
    }
    media(
      season: $season,
      seasonYear: $seasonYear,
      type: ANIME,
      sort: POPULARITY_DESC
    ) {
      ...MediaFields
    }
  }
}
