query SearchAnime(
  $page: Int = 1,
  $perPage: Int = 20,
  $search: String,
  $type: MediaType = ANIME,
  $format: MediaFormat,
  $status: MediaStatus,
  $genre: String,
  $sort: [MediaSort] = [POPULARITY_DESC]
) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      total
      currentPage
      lastPage
      hasNextPage
      perPage
    }
    media(
      search: $search,
      type: $type,
      format: $format,
      status: $status,
      genre: $genre,
      sort: $sort
    ) {
      ...MediaFields
    }
  }
}
