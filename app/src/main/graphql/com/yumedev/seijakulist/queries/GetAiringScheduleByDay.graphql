query GetAiringScheduleByDay(
  $airingAt_greater: Int!,
  $airingAt_lesser: Int!,
  $page: Int = 1,
  $perPage: Int = 50
) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      total
      currentPage
      lastPage
      hasNextPage
      perPage
    }
    airingSchedules(
      airingAt_greater: $airingAt_greater,
      airingAt_lesser: $airingAt_lesser,
      sort: TIME_DESC
    ) {
      id
      airingAt
      timeUntilAiring
      episode
      mediaId
      media {
        id
        idMal
        title {
          romaji
          english
          native
        }
        coverImage {
          extraLarge
          large
          medium
        }
        bannerImage
        averageScore
        popularity
        status
        genres
        episodes
        seasonYear
        type
        format
      }
    }
  }
}
